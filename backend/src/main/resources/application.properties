# Server
server.port=8080

# H2 In-Memory (Zero Config)
spring.datasource.url=jdbc:h2:mem:wellness_db;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Optional MySQL
# spring.datasource.url=jdbc:mysql://localhost:3306/wellness_marketplace?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.datasource.username=
# spring.datasource.password=
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# SQL INIT
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=YourJWTSecretKey
jwt.expiration=86400000

# Email (Gmail SMTP) — using placeholders
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=wellnessmarketplace058@gmail.com
spring.mail.password=password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.from=wellnessmarketplace058@gmail.com

# SendGrid
sendgrid.api.key=YourSendGridAPIKey