# ===============================
# DATABASE CONFIG (H2 - DEV)
# ===============================
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# JACKSON
# ===============================
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false

# ===============================
# JWT CONFIG (IMPORTANT)
# ===============================
# MUST be at least 32 characters (256 bits) for HS256
app.jwt.secret=THIS_IS_A_VERY_STRONG_JWT_SECRET_KEY_WITH_MORE_THAN_32_CHARACTERS_123456
app.jwt.access-token-validity-ms=900000
app.jwt.refresh-token-validity-ms=604800000

# ===============================
# WEBSOCKET
# ===============================
spring.websocket.message-broker.enabled=true

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework.security=INFO
